<!DOCTYPE html>
<html lang="id">
<head>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapikan Excel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;cursor:none !important;}
  :root{
    --blue-50:#EFF6FF;--blue-100:#DBEAFE;--blue-200:#BFDBFE;--blue-600:#2563EB;--blue-dark:#1D4ED8;
    --green:#16A34A;--green-light:#F0FDF4;--green-border:#BBF7D0;
    --amber:#D97706;--amber-light:#FFFBEB;--amber-border:#FDE68A;
    --red:#DC2626;--red-light:#FEF2F2;--red-border:#FECACA;
    --purple:#7C3AED;--purple-light:#F5F3FF;--purple-border:#DDD6FE;
    --slate-50:#F8FAFC;--slate-100:#F1F5F9;--slate-200:#E2E8F0;
    --slate-400:#94A3B8;--slate-600:#475569;--slate-800:#1E293B;
    --radius:16px;--radius-sm:10px;
  }
  body{font-family:'Plus Jakarta Sans',sans-serif;background:transparent;color:var(--slate-800);padding:1.5rem;font-size:14px;line-height:1.6;}
  .card{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;box-shadow:0 1px 8px rgba(15,23,42,0.06);}
  .card-header{padding:.875rem 1.25rem;background:var(--slate-50);border-bottom:1px solid var(--slate-200);display:flex;align-items:center;gap:10px;}
  .card-title{font-size:14px;font-weight:700;color:var(--slate-800);}
  .card-body{padding:1.25rem;}
  .drop-zone{border:2px dashed var(--blue-200);border-radius:var(--radius-sm);padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--blue-50);}
  .drop-zone:hover,.drop-zone.drag{border-color:var(--blue-600);background:var(--blue-100);}
  .drop-zone-icon{font-size:2rem;margin-bottom:.5rem;}
  .drop-zone p{font-size:14px;font-weight:600;color:var(--blue-600);margin-bottom:.25rem;}
  .drop-zone span{font-size:12px;color:var(--slate-400);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
  .btn-primary{background:linear-gradient(135deg,#6366F1,#4F46E5);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,0.3);}
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-green{background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff;box-shadow:0 4px 14px rgba(34,197,94,0.3);}
  .btn-green:hover{transform:translateY(-1px);}
  .btn-ghost{background:var(--slate-100);color:var(--slate-600);border:1.5px solid var(--slate-200);}
  .btn-ghost:hover{background:var(--slate-200);}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}
  .col-config{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:1rem;}
  .col-select-group label{font-size:11px;font-weight:700;color:var(--slate-600);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px;}
  .col-select-group select{width:100%;padding:8px 10px;border:1.5px solid var(--slate-200);border-radius:8px;font-size:13px;font-family:inherit;color:var(--slate-800);background:#fff;}
  .col-select-group select:focus{outline:none;border-color:var(--blue-600);}
  .preview-table{width:100%;border-collapse:collapse;font-size:12px;}
  .preview-table th{background:var(--slate-50);padding:.5rem .75rem;text-align:left;font-weight:700;color:var(--slate-600);font-size:11px;border-bottom:2px solid var(--slate-200);}
  .preview-table td{padding:.5rem .75rem;border-bottom:1px solid var(--slate-100);}
  .preview-table tr:hover td{background:var(--slate-50);}
  .badge-area{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;background:var(--purple-light);color:var(--purple);border:1px solid var(--purple-border);}
  .badge-mode{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;}
  .badge-mode.kolom{background:var(--blue-50);color:var(--blue-600);border:1px solid var(--blue-200);}
  .badge-mode.alamat{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border);}
  .badge-mode.scan{background:var(--purple-light);color:var(--purple);border:1px solid var(--purple-border);}
  .info-box{padding:.875rem 1rem;border-radius:var(--radius-sm);font-size:13px;margin-bottom:1rem;}
  .info-box.blue{background:var(--blue-50);border:1px solid var(--blue-200);color:var(--blue-dark);}
  .info-box.green{background:var(--green-light);border:1px solid var(--green-border);color:var(--green);}
  .info-box.amber{background:var(--amber-light);border:1px solid var(--amber-border);color:var(--amber);}
  .area-count-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.875rem;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;}
  .pill-purple{background:var(--purple-light);color:var(--purple);border:1px solid var(--purple-border);}
  .pill-blue{background:var(--blue-50);color:var(--blue-600);border:1px solid var(--blue-200);}
  .detect-status{padding:.875rem 1rem;border-radius:var(--radius-sm);font-size:13px;margin-bottom:1rem;border:1px solid var(--slate-200);background:var(--slate-50);}
  .detect-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
  .detect-label{font-size:11px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:.04em;min-width:80px;}
  #configCard,#previewCard{display:none;}
</style>
<link rel="stylesheet" href="../assets/css/tools.css">
</head>
<body>

<!-- STEP 1: Upload -->
<div class="card">
  <div class="card-header">
    <span style="font-size:18px">📁</span>
    <span class="card-title">Upload File Excel yang Perlu Dirapikan</span>
  </div>
  <div class="card-body">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileIn').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
      <div class="drop-zone-icon">🧹</div>
      <p>Klik atau drag file Excel di sini</p>
      <span>Bisa 1 sheet besar yang belum tersortir, atau multi-sheet</span>
    </div>
    <input type="file" id="fileIn" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])">
    <div id="fileInfo" style="font-size:12px;color:var(--slate-400);margin-top:.75rem;"></div>
  </div>
</div>

<!-- STEP 2: Config -->
<div class="card" id="configCard">
  <div class="card-header">
    <span style="font-size:18px">⚙️</span>
    <span class="card-title">Konfigurasi</span>
  </div>
  <div class="card-body">

    <!-- Auto-detect status -->
    <div class="detect-status" id="detectStatus"></div>

    <div class="col-config">
      <div class="col-select-group">
        <label>Sheet Sumber</label>
        <select id="sheetSel" onchange="changeSheet()"></select>
      </div>
      <div class="col-select-group">
        <label>Sortir Berdasarkan</label>
        <select id="sortCol">
          <option value="">— Tidak disortir —</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary" onclick="doPreview()">👁 Preview Hasil</button>
  </div>
</div>

<!-- STEP 3: Preview -->
<div class="card" id="previewCard">
  <div class="card-header">
    <span style="font-size:18px">👁</span>
    <span class="card-title">Preview Hasil Pemisahan</span>
  </div>
  <div class="card-body">
    <div class="area-count-row" id="areaCountRow"></div>
    <div style="overflow-x:auto;max-height:320px;overflow-y:auto;">
      <table class="preview-table">
        <thead id="previewHead"></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
    <div style="margin-top:1rem;display:flex;gap:.75rem;flex-wrap:wrap;">
      <button class="btn btn-green" onclick="downloadRapikan()">⬇️ Download Excel Rapi</button>
      <button class="btn btn-ghost" onclick="resetAll()">🔄 Upload Ulang</button>
    </div>
  </div>
</div>

<script>
// ── AREA ENGINE ──────────────────────────────────────────────────────────────
// Urut: PALING SPESIFIK dulu, baru umum
// "Bandung Barat" dicek sebelum "Bandung"
// "Kota Bandung" dan "Bandung" (biasa) → keduanya → label "Bandung"
const AREA_MAP = [
  { label: 'Bandung Barat',  re: /\bBandung\s+Barat\b|\bKBB\b/i },
  { label: 'Bandung',        re: /\bBandung\b/i },          // mencakup "Kota Bandung" juga
  { label: 'Bekasi',         re: /\bBekasi\b/i },
  { label: 'Bogor',          re: /\bBogor\b/i },
  { label: 'Cimahi',         re: /\bCimahi\b/i },
  { label: 'Cirebon',        re: /\bCirebon\b/i },
  { label: 'Depok',          re: /\bDepok\b/i },
  { label: 'Karawang',       re: /\bKarawang\b|\bKRW\b/i },
  { label: 'Cianjur',        re: /\bCianjur\b/i },
  { label: 'Sukabumi',       re: /\bSukabumi\b/i },
  { label: 'Garut',          re: /\bGarut\b/i },
  { label: 'Tasikmalaya',    re: /\bTasikmalaya\b|\bTasik\b/i },
  { label: 'Banjar',         re: /\bBanjar\b/i },
  { label: 'Ciamis',         re: /\bCiamis\b/i },
  { label: 'Pangandaran',    re: /\bPangandaran\b/i },
  { label: 'Kuningan',       re: /\bKuningan\b/i },
  { label: 'Majalengka',     re: /\bMajalengka\b/i },
  { label: 'Indramayu',      re: /\bIndramayu\b/i },
  { label: 'Subang',         re: /\bSubang\b/i },
  { label: 'Purwakarta',     re: /\bPurwakarta\b/i },
  { label: 'Sumedang',       re: /\bSumedang\b/i },
];

function deteksiArea(teks) {
  const s = String(teks || '');
  for (const k of AREA_MAP) {
    if (k.re.test(s)) return k.label;
  }
  return null; // tidak cocok
}

// ── State ────────────────────────────────────────────────────────────────────
let workbook = null;
let headers = [];
let allRows = [];
let areaGroups = {};
let detectedMode = ''; // 'kolom' | 'alamat' | 'scan'
let areaColIdx = -1;
let alamatColIdx = -1;

// ── File handler ─────────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    workbook = XLSX.read(e.target.result, { type: 'array' });
    document.getElementById('fileInfo').innerHTML =
      `✅ <strong>${file.name}</strong> — ${workbook.SheetNames.length} sheet: ${workbook.SheetNames.join(', ')}`;
    document.getElementById('sheetSel').innerHTML =
      workbook.SheetNames.map(s => `<option value="${s}">${s}</option>`).join('');
    changeSheet();
    document.getElementById('configCard').style.display = 'block';
  };
  reader.readAsArrayBuffer(file);
}

function changeSheet() {
  const ws = workbook.Sheets[document.getElementById('sheetSel').value];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  // Temukan baris header
  let headerIdx = 0;
  for (let i = 0; i < Math.min(6, rows.length); i++) {
    const r = rows[i].map(c => String(c).toLowerCase());
    if (r.some(c => c.includes('nama') || c.includes('slo') || c.includes('nidi') ||
                    c.includes('area') || c.includes('alamat') || c.includes('kota'))) {
      headerIdx = i; break;
    }
  }

  headers  = rows[headerIdx].map(c => String(c));
  allRows  = rows.slice(headerIdx + 1).filter(r => r.some(c => c !== ''));

  // ── AUTO-DETECT kolom area & alamat ──
  areaColIdx   = headers.findIndex(h => /(area|kota|kabupaten|wilayah|daerah|region)/i.test(h));
  alamatColIdx = headers.findIndex(h => /(alamat|address|lokasi|tempat)/i.test(h));

  // Tentukan mode deteksi
  if (areaColIdx >= 0) {
    detectedMode = 'kolom';
  } else if (alamatColIdx >= 0) {
    detectedMode = 'alamat';
  } else {
    detectedMode = 'scan';
  }

  // Tampilkan status
  renderDetectStatus();

  // Populate sort col
  const opts = headers.map((h,i) => `<option value="${i}">${h}</option>`).join('');
  document.getElementById('sortCol').innerHTML = '<option value="">— Tidak disortir —</option>' + opts;
}

function renderDetectStatus() {
  let icon, text, cls;
  if (detectedMode === 'kolom') {
    icon = '📋'; cls = 'kolom';
    text = `Kolom <strong>"${headers[areaColIdx]}"</strong> ditemukan → data dikelompokkan otomatis dari kolom ini.`;
  } else if (detectedMode === 'alamat') {
    icon = '📍'; cls = 'alamat';
    text = `Kolom area tidak ditemukan. Kolom <strong>"${headers[alamatColIdx]}"</strong> akan di-scan untuk mendeteksi kota/kabupaten.`;
  } else {
    icon = '🔍'; cls = 'scan';
    const allHeaders = headers.filter(h => h).join(', ');
    text = `Kolom area & alamat tidak ditemukan di header: <em>${allHeaders}</em>. Seluruh teks tiap baris di-scan otomatis untuk mendeteksi nama kota/kabupaten Jawa Barat.`;
  }
  document.getElementById('detectStatus').innerHTML = `
    <div class="detect-row">
      <span class="detect-label">Mode</span>
      <span class="badge-mode ${cls}">${icon} ${detectedMode === 'kolom' ? 'Dari Kolom' : detectedMode === 'alamat' ? 'Dari Alamat' : 'Scan Semua'}</span>
      <span style="font-size:13px;color:var(--slate-600)">${text}</span>
    </div>`;
}

// ── Tentukan area sebuah row (OTOMATIS) ─────────────────────────────────────
function tentukanAreaRow(row) {
  // Mode 1: ada kolom khusus area/wilayah → pakai langsung
  if (detectedMode === 'kolom') {
    const val = String(row[areaColIdx] || '').trim();
    if (val) {
      const d = deteksiArea(val);
      return d || val; // kalau tidak cocok AREA_MAP, gunakan nilai aslinya
    }
  }

  // Mode 2: ada kolom alamat → scan teks alamat saja
  if (detectedMode === 'alamat') {
    const d = deteksiArea(row[alamatColIdx]);
    if (d) return d;
  }

  // Mode 3 (scan) atau fallback: scan SEMUA kolom di baris ini
  for (const cell of row) {
    const d = deteksiArea(cell);
    if (d) return d;
  }

  return 'Lainnya';
}

// ── Preview ──────────────────────────────────────────────────────────────────
function doPreview() {
  const sortIdx = document.getElementById('sortCol').value !== ''
    ? parseInt(document.getElementById('sortCol').value) : -1;

  areaGroups = {};
  for (const row of allRows) {
    const area = tentukanAreaRow(row);
    if (!areaGroups[area]) areaGroups[area] = [];
    areaGroups[area].push(row);
  }

  if (sortIdx >= 0) {
    for (const area of Object.keys(areaGroups)) {
      areaGroups[area].sort((a, b) =>
        String(a[sortIdx]).localeCompare(String(b[sortIdx]), 'id'));
    }
  }

  // Sort areas: Lainnya paling bawah, sisanya alfabet
  const sortedAreas = Object.keys(areaGroups).sort((a, b) => {
    if (a === 'Lainnya') return 1;
    if (b === 'Lainnya') return -1;
    return a.localeCompare(b, 'id');
  });

  document.getElementById('areaCountRow').innerHTML =
    sortedAreas.map(a =>
      `<span class="pill pill-purple">📍 ${a}: ${areaGroups[a].length}</span>`
    ).join('');

  document.getElementById('previewHead').innerHTML =
    `<tr><th>Area Terdeteksi</th>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;

  let previewRows = [];
  const max = Math.max(2, Math.floor(50 / sortedAreas.length));
  for (const area of sortedAreas) {
    for (const row of areaGroups[area].slice(0, max)) {
      previewRows.push({ area, row });
    }
  }

  document.getElementById('previewBody').innerHTML = previewRows.map(({area, row}) =>
    `<tr><td><span class="badge-area">${area}</span></td>${headers.map((_,i)=>`<td>${row[i]??''}</td>`).join('')}</tr>`
  ).join('');

  document.getElementById('previewCard').style.display = 'block';
  document.getElementById('previewCard').scrollIntoView({ behavior: 'smooth' });
}

// ── Download ─────────────────────────────────────────────────────────────────
function downloadRapikan() {
  const wb = XLSX.utils.book_new();

  const sortedAreas = Object.keys(areaGroups).sort((a, b) => {
    if (a === 'Lainnya') return 1;
    if (b === 'Lainnya') return -1;
    return a.localeCompare(b, 'id');
  });

  // Sheet Semua Data
  const allData = [headers];
  for (const area of sortedAreas)
    for (const row of areaGroups[area])
      allData.push(headers.map((_,i) => row[i] ?? ''));
  const wsAll = XLSX.utils.aoa_to_sheet(allData);
  wsAll['!cols'] = headers.map(() => ({wch: 22}));
  XLSX.utils.book_append_sheet(wb, wsAll, 'Semua Data');

  // Sheet per area
  for (const area of sortedAreas) {
    const data = [headers, ...areaGroups[area].map(row => headers.map((_,i) => row[i] ?? ''))];
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = headers.map(() => ({wch: 22}));
    const safeName = area.substring(0, 28).replace(/[\\\/\?\*\[\]]/g, '');
    XLSX.utils.book_append_sheet(wb, ws, safeName || 'Lainnya');
  }

  XLSX.writeFile(wb, `Excel_Rapi_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── Reset ────────────────────────────────────────────────────────────────────
function resetAll() {
  workbook = null; headers = []; allRows = []; areaGroups = {};
  document.getElementById('fileIn').value = '';
  document.getElementById('fileInfo').innerHTML = '';
  document.getElementById('configCard').style.display = 'none';
  document.getElementById('previewCard').style.display = 'none';
}
</script>

<script src="../assets/js/cursor-bridge.js"></script>
</body>
</html>
