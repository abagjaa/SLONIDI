<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cari Data</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --blue-50:#EFF6FF;--blue-100:#DBEAFE;--blue-200:#BFDBFE;--blue-600:#2563EB;--blue-dark:#1D4ED8;
    --green:#16A34A;--green-light:#F0FDF4;--green-border:#BBF7D0;
    --amber:#D97706;--amber-light:#FFFBEB;--amber-border:#FDE68A;
    --purple:#7C3AED;--purple-light:#F5F3FF;--purple-border:#DDD6FE;
    --slate-50:#F8FAFC;--slate-100:#F1F5F9;--slate-200:#E2E8F0;
    --slate-400:#94A3B8;--slate-600:#475569;--slate-800:#1E293B;
    --radius:16px;--radius-sm:10px;
  }
  body{font-family:'Plus Jakarta Sans',sans-serif;background:transparent;color:var(--slate-800);padding:1.5rem;font-size:14px;line-height:1.6;}
  .card{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;box-shadow:0 1px 8px rgba(15,23,42,0.06);}
  .card-header{padding:.875rem 1.25rem;background:var(--slate-50);border-bottom:1px solid var(--slate-200);display:flex;align-items:center;gap:10px;}
  .card-title{font-size:14px;font-weight:700;color:var(--slate-800);}
  .card-body{padding:1.25rem;}
  .drop-zone{border:2px dashed var(--blue-200);border-radius:var(--radius-sm);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--blue-50);}
  .drop-zone:hover,.drop-zone.drag{border-color:var(--blue-600);background:var(--blue-100);}
  .drop-zone p{font-size:13px;font-weight:600;color:var(--blue-600);margin-bottom:.2rem;}
  .drop-zone span{font-size:12px;color:var(--slate-400);}
  .search-wrap{display:flex;gap:.75rem;align-items:center;}
  .search-input{flex:1;padding:11px 16px;border:2px solid var(--blue-200);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--slate-800);outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--blue-600);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
  .btn-primary{background:linear-gradient(135deg,#6366F1,#4F46E5);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,0.3);}
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-ghost{background:var(--slate-100);color:var(--slate-600);border:1.5px solid var(--slate-200);}
  .btn-ghost:hover{background:var(--slate-200);}
  .filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem;}
  .filter-btn{padding:5px 14px;border-radius:99px;border:1.5px solid var(--slate-200);background:#fff;font-size:12px;font-weight:600;color:var(--slate-600);cursor:pointer;font-family:inherit;transition:all .15s;}
  .filter-btn.active{background:var(--blue-600);color:#fff;border-color:var(--blue-600);}
  .result-table{width:100%;border-collapse:collapse;font-size:12px;}
  .result-table th{background:var(--slate-50);padding:.625rem .875rem;text-align:left;font-weight:700;color:var(--slate-600);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--slate-200);position:sticky;top:0;}
  .result-table td{padding:.625rem .875rem;border-bottom:1px solid var(--slate-100);vertical-align:middle;}
  .result-table tr:hover td{background:var(--blue-50);}
  .badge-sheet{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700;background:var(--purple-light);color:var(--purple);border:1px solid var(--purple-border);}
  .highlight{background:#FEF9C3;padding:1px 2px;border-radius:3px;font-weight:700;color:#92400E;}
  .num-slo{font-family:monospace;font-size:11px;color:var(--blue-600);font-weight:700;}
  .num-nidi{font-family:monospace;font-size:11px;color:var(--green);font-weight:700;}
  .empty-state{text-align:center;padding:2.5rem 1rem;color:var(--slate-400);}
  .empty-state .emoji{font-size:2.5rem;margin-bottom:.5rem;}
  .result-info{font-size:12px;color:var(--slate-400);margin-bottom:.75rem;}
  mark{background:#FDE68A;border-radius:2px;padding:0 2px;}
  #searchArea{display:none;}
  #resultWrap{display:none;}
</style>
</head>
<body>

<!-- Upload -->
<div class="card">
  <div class="card-header">
    <span style="font-size:18px">📁</span>
    <span class="card-title">Upload File Excel</span>
  </div>
  <div class="card-body">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileIn').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
      <p>🔎 Klik atau drag file Excel untuk mulai mencari</p>
      <span>Multi-sheet didukung — semua sheet akan dicari sekaligus</span>
    </div>
    <input type="file" id="fileIn" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])">
    <div id="fileInfo" style="font-size:12px;color:var(--slate-400);margin-top:.625rem;"></div>
  </div>
</div>

<!-- Search -->
<div class="card" id="searchArea">
  <div class="card-header">
    <span style="font-size:18px">🔍</span>
    <span class="card-title">Cari Data</span>
  </div>
  <div class="card-body">
    <div class="search-wrap">
      <input class="search-input" id="queryInput" type="text" placeholder="Ketik nama, nomor SLO, atau NIDI..."
        oninput="doSearch()" onkeydown="if(event.key==='Escape'){clearSearch()}">
      <button class="btn btn-ghost" onclick="clearSearch()">✕ Clear</button>
    </div>
    <div class="filter-row">
      <span style="font-size:11px;color:var(--slate-400);align-self:center;">Filter:</span>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Semua</button>
      <button class="filter-btn" data-filter="nama" onclick="setFilter('nama')">Nama</button>
      <button class="filter-btn" data-filter="slo" onclick="setFilter('slo')">No. SLO</button>
      <button class="filter-btn" data-filter="nidi" onclick="setFilter('nidi')">No. NIDI</button>
      <div id="sheetFilters" style="display:flex;gap:.5rem;flex-wrap:wrap;"></div>
    </div>
  </div>
</div>

<!-- Result -->
<div class="card" id="resultWrap">
  <div class="card-header">
    <span style="font-size:18px">📋</span>
    <span class="card-title">Hasil Pencarian</span>
  </div>
  <div class="card-body">
    <div id="resultInfo" class="result-info"></div>
    <div style="overflow-x:auto;max-height:480px;overflow-y:auto;">
      <table class="result-table">
        <thead>
          <tr>
            <th>Sheet / Area</th>
            <th>Nama Pemilik</th>
            <th>No. SLO</th>
            <th>No. NIDI</th>
            <th>Info Lain</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="emoji">🔍</div>
      <div style="font-weight:600;color:var(--slate-600);">Tidak ada hasil</div>
      <div style="font-size:12px;margin-top:4px;">Coba kata kunci lain atau hapus filter</div>
    </div>
  </div>
</div>

<script>
let allData = []; // [{sheet, nama, slo, nidi, extra, rowRaw}]
let activeFilter = 'all';
let activeSheetFilter = null;
let headers = {};

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    allData = [];
    headers = {};

    for (const sheetName of wb.SheetNames) {
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (rows.length < 2) continue;

      // Find header row
      let headerIdx = 0;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        const r = rows[i].map(c => String(c).toLowerCase());
        if (r.some(c => c.includes('nama') || c.includes('slo') || c.includes('nidi'))) {
          headerIdx = i; break;
        }
      }

      const hdrs = rows[headerIdx].map(c => String(c));
      headers[sheetName] = hdrs;

      const namaIdx = findCol(hdrs, ['nama', 'name', 'pemilik']);
      const sloIdx  = findCol(hdrs, ['slo', 'laik operasi', 'sertifikat']);
      const nidiIdx = findCol(hdrs, ['nidi', 'identitas', 'registrasi']);

      for (const row of rows.slice(headerIdx + 1)) {
        if (!row.some(c => c !== '')) continue;
        const nama  = namaIdx >= 0 ? String(row[namaIdx] || '').trim() : '';
        const slo   = sloIdx  >= 0 ? String(row[sloIdx]  || '').trim() : '';
        const nidi  = nidiIdx >= 0 ? String(row[nidiIdx] || '').trim() : '';
        // Extra columns (skip nama/slo/nidi)
        const skip = new Set([namaIdx, sloIdx, nidiIdx].filter(i => i >= 0));
        const extra = hdrs.map((h, i) => skip.has(i) ? null : (row[i] ? `${h}: ${row[i]}` : null))
          .filter(Boolean).slice(0, 3).join(' • ');

        allData.push({ sheet: sheetName, nama, slo, nidi, extra, row });
      }
    }

    document.getElementById('fileInfo').innerHTML =
      `✅ <strong>${file.name}</strong> — ${wb.SheetNames.length} sheet, ${allData.length} baris data dimuat`;

    // Sheet filter buttons
    document.getElementById('sheetFilters').innerHTML =
      wb.SheetNames.map(s => `<button class="filter-btn" data-sheet="${s}" onclick="setSheetFilter('${s}')">${s}</button>`).join('');

    document.getElementById('searchArea').style.display = 'block';
    document.getElementById('resultWrap').style.display = 'block';
    document.getElementById('queryInput').focus();
    doSearch();
  };
  reader.readAsArrayBuffer(file);
}

function findCol(headers, keywords) {
  for (const kw of keywords) {
    const idx = headers.findIndex(h => h && String(h).toLowerCase().includes(kw.toLowerCase()));
    if (idx >= 0) return idx;
  }
  return -1;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  doSearch();
}

function setSheetFilter(sheet) {
  if (activeSheetFilter === sheet) {
    activeSheetFilter = null;
    document.querySelectorAll('.filter-btn[data-sheet]').forEach(b => b.classList.remove('active'));
  } else {
    activeSheetFilter = sheet;
    document.querySelectorAll('.filter-btn[data-sheet]').forEach(b => b.classList.toggle('active', b.dataset.sheet === sheet));
  }
  doSearch();
}

function clearSearch() {
  document.getElementById('queryInput').value = '';
  doSearch();
}

function doSearch() {
  const q = document.getElementById('queryInput').value.trim().toLowerCase();
  let results = allData;

  // Filter by sheet
  if (activeSheetFilter) results = results.filter(d => d.sheet === activeSheetFilter);

  // Filter by field
  if (q) {
    results = results.filter(d => {
      if (activeFilter === 'nama') return d.nama.toLowerCase().includes(q);
      if (activeFilter === 'slo')  return d.slo.toLowerCase().includes(q);
      if (activeFilter === 'nidi') return d.nidi.toLowerCase().includes(q);
      return d.nama.toLowerCase().includes(q) || d.slo.toLowerCase().includes(q) ||
             d.nidi.toLowerCase().includes(q) || d.extra.toLowerCase().includes(q);
    });
  }

  const MAX = 200;
  const shown = results.slice(0, MAX);

  document.getElementById('resultInfo').innerHTML = q
    ? `Ditemukan <strong>${results.length}</strong> hasil untuk "<strong>${q}</strong>"${results.length > MAX ? ` (menampilkan ${MAX} pertama)` : ''}`
    : `Menampilkan <strong>${Math.min(results.length, MAX)}</strong> dari <strong>${allData.length}</strong> data`;

  if (shown.length === 0) {
    document.getElementById('resultBody').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  document.getElementById('resultBody').innerHTML = shown.map(d => {
    const hl = str => q ? str.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>') : str;
    return `<tr>
      <td><span class="badge-sheet">${d.sheet}</span></td>
      <td style="font-weight:500;max-width:200px">${hl(d.nama) || '<span style="color:var(--slate-400)">—</span>'}</td>
      <td><span class="num-slo">${hl(d.slo) || '<span style="color:var(--slate-400)">—</span>'}</span></td>
      <td><span class="num-nidi">${hl(d.nidi) || '<span style="color:var(--slate-400)">—</span>'}</span></td>
      <td style="font-size:11px;color:var(--slate-400);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.extra}">${d.extra || '—'}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
