<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Tools NADIA</title>
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<div id="aurora-bg"></div>

<div class="card">
  <div class="logo"><span>N</span></div>
  <h1>Tools NADIA</h1>
  <p class="subtitle">Masukkan password untuk melanjutkan</p>

  <div class="error" id="errorMsg">Password salah. Coba lagi ya! 🙈</div>

  <div class="input-wrap">
    <label>Password</label>
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <input type="password" id="passInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
  </div>

  <button class="btn-login" onclick="tryLogin()">Masuk →</button>

  <p class="footer-note">Dibuat dengan 💙 untuk kamu</p>

  <a href="landing.html" class="btn-back">← Kembali</a>
</div>

<script src="assets/js/login.js"></script>
<script src="assets/js/splash-cursor.js"></script>
<script src="assets/js/signature.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ogl@1.0.8/dist/ogl.umd.js"></script>
<script>
(function initAurora() {
  const ctn = document.getElementById('aurora-bg');
  if (!ctn || !window.ogl) return;
  const { Renderer, Program, Mesh, Color, Triangle } = window.ogl;
  const VERT = `#version 300 es
in vec2 position;
void main() { gl_Position = vec4(position, 0.0, 1.0); }`;
  const FRAG = `#version 300 es
precision highp float;
uniform float uTime; uniform float uAmplitude;
uniform vec3 uColorStops[3]; uniform vec2 uResolution; uniform float uBlend;
out vec4 fragColor;
vec3 permute(vec3 x){return mod(((x*34.0)+1.0)*x,289.0);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod(i,289.0);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m;m=m*m;
  vec3 x=2.0*fract(p*C.www)-1.0;vec3 h=abs(x)-0.5;
  vec3 ox=floor(x+0.5);vec3 a0=x-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);}
struct ColorStop{vec3 color;float position;};
#define COLOR_RAMP(colors,factor,finalColor){int index=0;for(int i=0;i<2;i++){ColorStop cc=colors[i];bool iib=cc.position<=factor;index=int(mix(float(index),float(i),float(iib)));}ColorStop cc=colors[index];ColorStop nc=colors[index+1];float range=nc.position-cc.position;float lf=(factor-cc.position)/range;finalColor=mix(cc.color,nc.color,lf);}
void main(){
  vec2 uv=gl_FragCoord.xy/uResolution;
  ColorStop colors[3];
  colors[0]=ColorStop(uColorStops[0],0.0);
  colors[1]=ColorStop(uColorStops[1],0.5);
  colors[2]=ColorStop(uColorStops[2],1.0);
  vec3 rampColor;COLOR_RAMP(colors,uv.x,rampColor);
  float height=snoise(vec2(uv.x*2.0+uTime*0.1,uTime*0.25))*0.5*uAmplitude;
  height=exp(height);height=(uv.y*2.0-height+0.2);
  float intensity=0.6*height;
  float midPoint=0.20;
  float auroraAlpha=smoothstep(midPoint-uBlend*0.5,midPoint+uBlend*0.5,intensity);
  vec3 auroraColor=intensity*rampColor;
  fragColor=vec4(auroraColor*auroraAlpha,auroraAlpha);}`;

  const colorStops = ['#818CF8', '#A78BFA', '#F472B6'];
  const renderer = new Renderer({ alpha: true, premultipliedAlpha: true, antialias: true });
  const gl = renderer.gl;
  gl.clearColor(0,0,0,0);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
  gl.canvas.style.backgroundColor = 'transparent';

  let program;
  function resize() {
    const w = ctn.offsetWidth, h = ctn.offsetHeight;
    renderer.setSize(w, h);
    if (program) program.uniforms.uResolution.value = [w, h];
  }
  const geometry = new Triangle(gl);
  if (geometry.attributes.uv) delete geometry.attributes.uv;
  const colorStopsArray = colorStops.map(hex => { const c = new Color(hex); return [c.r, c.g, c.b]; });
  program = new Program(gl, {
    vertex: VERT, fragment: FRAG,
    uniforms: {
      uTime: { value: 0 }, uAmplitude: { value: 1.0 },
      uColorStops: { value: colorStopsArray },
      uResolution: { value: [ctn.offsetWidth, ctn.offsetHeight] },
      uBlend: { value: 0.39 }
    }
  });
  const mesh = new Mesh(gl, { geometry, program });
  ctn.appendChild(gl.canvas);
  const ro = new ResizeObserver(() => resize());
  ro.observe(ctn);
  requestAnimationFrame(() => resize());
  (function update(t) {
    requestAnimationFrame(update);
    program.uniforms.uTime.value = t * 0.001 * 1.3 * 0.1;
    renderer.render({ scene: mesh });
  })(0);
})();
</script>
</body>
</html>
