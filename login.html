<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Tools NADIA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #EEF6FF 0%, #F8F0FF 50%, #EEF6FF 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  /* Decorative blobs */
  .blob {
    position: absolute; border-radius: 50%;
    filter: blur(60px); opacity: 0.35; pointer-events: none;
  }
  .blob-1 { width: 400px; height: 400px; background: #BFDBFE; top: -100px; left: -100px; }
  .blob-2 { width: 350px; height: 350px; background: #DDD6FE; bottom: -80px; right: -80px; }
  .blob-3 { width: 200px; height: 200px; background: #BAE6FD; top: 40%; left: 10%; }

  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 28px;
    padding: 3rem 2.5rem;
    width: 100%; max-width: 400px;
    box-shadow: 0 8px 40px rgba(96,165,250,0.12), 0 2px 8px rgba(0,0,0,0.04);
    position: relative; z-index: 1;
    text-align: center;
  }

  .logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #60A5FA, #A78BFA);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    box-shadow: 0 8px 24px rgba(96,165,250,0.3);
  }
  .logo span { color: #fff; font-weight: 700; font-size: 18px; letter-spacing: -1px; }

  h1 { font-size: 22px; font-weight: 700; color: #1E3A5F; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #94A3B8; margin-bottom: 2rem; }

  .input-wrap { position: relative; margin-bottom: 1rem; text-align: left; }
  .input-wrap label { display: block; font-size: 12px; font-weight: 600; color: #64748B; margin-bottom: 6px; letter-spacing: .04em; }
  .input-wrap input {
    width: 100%; padding: 13px 16px 13px 44px;
    border: 1.5px solid #E2E8F0;
    border-radius: 14px;
    font-size: 14px; font-family: inherit;
    background: #F8FAFF;
    color: #1E3A5F;
    transition: all .2s;
    outline: none;
  }
  .input-wrap input:focus { border-color: #93C5FD; background: #fff; box-shadow: 0 0 0 4px rgba(147,197,253,0.15); }
  .input-wrap .icon {
    position: absolute; left: 14px; bottom: 13px;
    color: #94A3B8; pointer-events: none;
  }

  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #60A5FA, #818CF8);
    border: none; border-radius: 14px;
    color: #fff; font-size: 15px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    margin-top: .5rem;
    box-shadow: 0 4px 16px rgba(96,165,250,0.35);
    transition: all .2s;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(96,165,250,0.4); }
  .btn-login:active { transform: translateY(0); }

  .error {
    background: #FEF2F2; border: 1px solid #FECACA;
    color: #EF4444; font-size: 13px;
    border-radius: 10px; padding: 10px 14px;
    margin-bottom: 1rem; display: none; text-align: left;
  }

  .footer-note { font-size: 11px; color: #CBD5E1; margin-top: 1.5rem; }

  .hearts { font-size: 18px; margin-bottom: .5rem; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">
  <div class="logo"><span>PP</span></div>
  <div class="hearts">🩵</div>
  <h1>Tools NADIA</h1>
  <p class="subtitle">Masukkan password untuk melanjutkan</p>

  <div class="error" id="errorMsg">Password salah. Coba lagi ya! 🙈</div>

  <div class="input-wrap">
    <label>PASSWORD</label>
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <input type="password" id="passInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
  </div>

  <button class="btn-login" onclick="tryLogin()">Masuk ✨</button>

  <p class="footer-note">Dibuat dengan 💙 untuk kamu</p>
</div>

<script>
  // Ganti password di sini
  const PASSWORD = 'akusayangabagja';

  function tryLogin() {
    const val = document.getElementById('passInput').value;
    if (val === PASSWORD) {
      sessionStorage.setItem('ppiln_auth', 'true');
      window.location.href = 'index.html';
    } else {
      const err = document.getElementById('errorMsg');
      err.style.display = 'block';
      document.getElementById('passInput').value = '';
      document.getElementById('passInput').focus();
    }
  }

  // Jika sudah login, langsung ke dashboard
  if (sessionStorage.getItem('ppiln_auth') === 'true') {
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
